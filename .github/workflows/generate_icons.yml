name: Generate App Icons

on:
  workflow_dispatch: # Isse aap isko manual button dabakar chala payenge

jobs:
  generate-icons:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v4
        with:
          # Push karne ke liye permission chahiye
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 2. Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: 3. Get dependencies
        run: flutter pub get

      - name: 4. Generate New Icons (Removes old ones)
        run: dart run flutter_launcher_icons

      - name: 5. Commit and Push back to GitHub
        run: |
          # GitHub bot ban kar naye icons ko save karega
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Android ke icon folders ko add karega
          git add android/app/src/main/res/
          
          # Agar iOS enable kiya hoga future mein toh uske liye
          git add ios/Runner/Assets.xcassets/AppIcon.appiconset/ || echo "No iOS icons"
          
          # Commit and Push
          git commit -m "Generated new app icons and replaced old ones" || echo "No changes to commit"
          git push
